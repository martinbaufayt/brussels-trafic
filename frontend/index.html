<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brussels Traffic Live</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    #map { height: 100vh; }
    #status {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;
      z-index: 1000;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    #legend {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.9);
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 13px;
      z-index: 1000;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      line-height: 1.8;
    }
    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status">Chargement...</div>
  <div id="legend">
    <strong>Vitesse moyenne</strong><br>
    <span class="dot" style="background:#e74c3c"></span> &lt; 20 km/h<br>
    <span class="dot" style="background:#f39c12"></span> 20 – 50 km/h<br>
    <span class="dot" style="background:#27ae60"></span> &gt; 50 km/h<br>
    <span class="dot" style="background:#95a5a6"></span> Pas de données
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="map.js"></script>
</body>
</html>
